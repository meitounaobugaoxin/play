<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>签到</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #F5F6F7;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden; /* 防止舞动时出现滚动条 */
        }

        /* 顶部导航栏 */
        .header {
            width: 100%;
            padding: 15px 16px;
            text-align: center;
            font-size: 17px;
            font-weight: 500;
            color: #333;
            background-color: #FFFFFF;
            position: relative;
        }

        .back-btn {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #333;
            text-decoration: none;
        }

        /* 签到容器 */
        .sign-container {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative; /* 为图片定位提供基准 */
        }

        /* 大圆按钮样式 */
        .sign-circle {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background-color: #198CFF;
            color: white;
            border: none;
            font-size: 36px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(25, 140, 255, 0.3);
            transition: all 0.2s ease;
            z-index: 10; /* 确保按钮在最上层 */
        }

        .sign-circle:active {
            transform: scale(0.96);
            background-color: #1270CE;
        }

        /* 舞动图片的样式 */
        /* 注意：我们使用 transition 而不是 animation 来实现随机移动 */
        .dancing-img {
            position: absolute;
            width: 100px; /* 图片大小 */
            height: 100px;
            border-radius: 50%; /* 如果是头像可以加圆角 */
            object-fit: cover;
            /* 添加过渡动画，让移动更平滑 */
            transition: all 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
            /* cubic-bezier 让移动有弹性效果 */
            pointer-events: none; /* 让图片不阻挡点击事件 */
            z-index: 1;
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            left: 50%;
            bottom: 60px;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="header">
    <a href="javascript:history.back()" class="back-btn">&lt;</a>
    签到
</div>

<div class="sign-container">
    <!-- 初始签到界面 -->
    <button id="signBtn" class="sign-circle">签到</button>
</div>

<div class="toast" id="toast">签到成功</div>

<script>
    // 音频链接（来自参考材料）
    const AUDIO_URL = "https://sky-take-out-exer.oss-cn-beijing.aliyuncs.com/dongbei.mp3";
    
    // 图片链接（这里使用一个占位符，你可以替换成你的图片地址）
    // 如果你需要显示特定的图片，请将 imageUrl 替换为你的图片 URL
    const IMAGE_URL = "https://sky-take-out-exer.oss-cn-beijing.aliyuncs.com/yujiedajiao.png"; 

    const signBtn = document.getElementById('signBtn');
    const toast = document.getElementById('toast');

    signBtn.addEventListener('click', async () => {
        // 1. 禁用按钮并隐藏
        signBtn.disabled = true;
        signBtn.style.opacity = '0.5';
        setTimeout(() => signBtn.style.display = 'none', 300); // 延迟隐藏以配合动画

        // 2. 播放提示音
        let audioPlayed = false;
        try {
            const audio = new Audio(AUDIO_URL);
            // 在用户交互上下文中播放音频
            await audio.play();
            audioPlayed = true;
        } catch (e) {
            console.log("音频播放失败（可能被浏览器策略阻止）:", e);
        }

        // 3. Toast 提示
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);

        // 4. 创建舞动图片
        const img = document.createElement('img');
        img.src = IMAGE_URL;
        img.className = 'dancing-img';
        document.querySelector('.sign-container').appendChild(img);

        // 5. 随机舞动函数
        // 使用 requestAnimationFrame 实现流畅动画循环
        function animateDance() {
            // 获取容器尺寸
            const container = document.querySelector('.sign-container');
            const containerRect = container.getBoundingClientRect();
            
            // 生成随机位置 (留出图片自身的边距)
            const maxX = containerRect.width - 100;
            const maxY = containerRect.height - 100;
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            // 应用随机位置
            img.style.left = randomX + 'px';
            img.style.top = randomY + 'px';

            // 为了模拟“舞动”，我们可以在每次移动后改变一点旋转角度
            const randomRotate = Math.random() * 20 - 10; // -10deg 到 10deg
            img.style.transform = `rotate(${randomRotate}deg)`;

            // 1.5秒后再次移动（与CSS transition 时间对应）
            setTimeout(() => {
                // 增加一点趣味性：在移动后有一定概率改变大小
                if (Math.random() > 0.7) {
                    const scale = 0.8 + Math.random() * 0.6; // 0.8 - 1.4 倍
                    img.style.transform = `scale(${scale}) rotate(${randomRotate}deg)`;
                }
                // 递归调用，形成持续的动画
                animateDance();
            }, 1600);
        }

        // 确保图片加载完成后再开始动画，防止第一次位置获取错误
        img.onload = function() {
            // 初始化位置为按钮附近
            img.style.left = (signBtn.offsetLeft + 60) + 'px';
            img.style.top = (signBtn.offsetTop + 60) + 'px';
            
            // 开始舞动
            animateDance();
        };

        // 错误处理：如果图片加载失败
        img.onerror = function() {
            console.error('图片加载失败，请检查 URL');
        };
    });
</script>

</body>
</html>
