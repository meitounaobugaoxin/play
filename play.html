<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>签到</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #F5F6F7;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 顶部导航栏 */
        .header {
            width: 100%;
            padding: 15px 16px;
            text-align: center;
            font-size: 17px;
            font-weight: 500;
            color: #333;
            background-color: #FFFFFF;
            position: relative;
        }

        .back-btn {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #333;
            text-decoration: none;
        }

        /* 签到容器 */
        .sign-container {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 大圆按钮样式 */
        .sign-circle {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background-color: #198CFF;
            color: white;
            border: none;
            font-size: 36px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(25, 140, 255, 0.3);
            transition: all 0.2s ease;
        }

        .sign-circle:active {
            transform: scale(0.96);
            background-color: #1270CE;
        }

        .sign-circle:disabled {
            background-color: #198CFF;
            cursor: default;
            transform: none;
        }

        /* 签到成功样式 */
        .success-wrapper {
            display: none;
            text-align: center;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
        }

        .success-text {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }

        .time-text {
            font-size: 16px;
            color: #999;
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            left: 50%;
            bottom: 60px;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="header">
    <a href="javascript:history.back()" class="back-btn">&lt;</a>
    签到
</div>

<div class="sign-container">
    <!-- 初始签到界面 -->
    <button id="signBtn" class="sign-circle">签到</button>

    <!-- 签到成功界面 (默认隐藏) -->
    <div id="successView" class="success-wrapper">
        <svg class="success-icon" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
            <path fill="#2DB36E" d="M425.813333 738.133333l-273.066666-273.066666 62.250666-62.250667 210.816 210.816 425.813334-425.813333 62.250667 62.250666-488.064 488.064z"/>
        </svg>
        <div class="success-text">签到成功</div>
        <div id="timeDisplay" class="time-text"></div>
    </div>
</div>

<div class="toast" id="toast">签到成功</div>

<script>
    // 音频链接
    const AUDIO_URL = "https://sky-take-out-exer.oss-cn-beijing.aliyuncs.com/dongbei.mp3";

    const signBtn = document.getElementById('signBtn');
    const successView = document.getElementById('successView');
    const timeDisplay = document.getElementById('timeDisplay');
    const toast = document.getElementById('toast');

    signBtn.addEventListener('click', async () => {
        // 1. 禁用按钮，切换显示
        signBtn.style.display = 'none';
        successView.style.display = 'block';

        // 2. 显示当前时间
        const now = new Date();
        const formattedTime = now.getMonth() + 1 + '-' + now.getDate() + ' ' + formatTwoDigits(now.getHours()) + ':' + formatTwoDigits(now.getMinutes());
        timeDisplay.textContent = formattedTime;

        // 3. 播放提示音
        try {
            const audio = new Audio(AUDIO_URL);
            await audio.play();
        } catch (e) {
            console.log("播放失败:", e);
        }

        // 4. Toast 提示
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    });

    // 辅助函数：补零
    function formatTwoDigits(num) {
        return num.toString().padStart(2, '0');
    }
</script>

</body>
</html>
