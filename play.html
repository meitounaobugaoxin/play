<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>签到</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #F5F6F7;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        .header {
            width: 100%;
            padding: 15px 16px;
            text-align: center;
            font-size: 17px;
            font-weight: 500;
            color: #333;
            background-color: #FFFFFF;
            position: relative;
        }

        .back-btn {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #333;
            text-decoration: none;
        }

        .sign-container {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .sign-circle {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background-color: #198CFF;
            color: white;
            border: none;
            font-size: 36px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(25, 140, 255, 0.3);
            transition: all 0.2s ease;
            z-index: 10;
        }

        .sign-circle:active {
            transform: scale(0.96);
            background-color: #1270CE;
        }

        /* 舞动图片核心样式 */
        .dancing-img {
            position: absolute;
            width: 120px;
            height: 120px;
            object-fit: contain;
            transition: all 1.2s ease-in-out;
            pointer-events: none;
            z-index: 5;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 60px;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="header">
    <a href="javascript:history.back()" class="back-btn">&lt;</a>
    签到
</div>

<div class="sign-container">
    <button id="signBtn" class="sign-circle">签到</button>
</div>

<div class="toast" id="toast">签到成功</div>

<script>
    // ==============================================
    // 【你只需要改这里！】
    // 替换成你自己的 阿里云OSS 音频 + 图片地址
    // ==============================================
    const AUDIO_URL = "https://sky-take-out-exer.oss-cn-beijing.aliyuncs.com/dongbei.mp3";
    const IMAGE_URL = "https://sky-take-out-exer.oss-cn-beijing.aliyuncs.com/yujiedajiao.png";

    const signBtn = document.getElementById('signBtn');
    const toast = document.getElementById('toast');
    let dancingImg = null;

    signBtn.addEventListener('click', async () => {
        // 1. 隐藏签到按钮
        signBtn.style.display = 'none';

        // 2. 播放音乐
        try {
            const audio = new Audio(AUDIO_URL);
            audio.volume = 0.8;
            await audio.play();
        } catch (err) {
            console.log("音乐播放失败", err);
        }

        // 3. 提示
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);

        // 4. 创建舞动图片
        dancingImg = document.createElement('img');
        dancingImg.src = IMAGE_URL;
        dancingImg.className = 'dancing-img';
        document.querySelector('.sign-container').appendChild(dancingImg);

        // 5. 开始疯狂舞动：随机位置 + 随机大小 + 随机旋转
        function startDance() {
            const box = document.querySelector('.sign-container');
            const w = box.clientWidth - 120;
            const h = box.clientHeight - 120;

            // 随机位置
            const x = Math.random() * w;
            const y = Math.random() * h;

            // 随机大小（0.6 ~ 1.5 倍）
            const scale = 0.6 + Math.random() * 0.9;

            // 随机旋转（-30° ~ 30°）
            const rotate = Math.random() * 60 - 30;

            // 应用效果
            dancingImg.style.left = x + 'px';
            dancingImg.style.top = y + 'px';
            dancingImg.style.transform = `scale(${scale}) rotate(${rotate}deg)`;

            // 每隔 1.2 秒变一次
            setTimeout(startDance, 1200);
        }

        // 图片加载完立刻开始舞动
        dancingImg.onload = function () {
            startDance();
        };
    });
</script>
</body>
</html>
